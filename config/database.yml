# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem 'sqlite3'
#
<%
require "uri"

env_value = ->(key) do
  value = ENV[key].to_s.strip
  value unless value.empty?
end

raw_mysql_url = [
  "MYSQL_URL",
  "DATABASE_URL",
  "MYSQL_PRIVATE_URL",
  "DATABASE_PRIVATE_URL",
  "MYSQL_PUBLIC_URL",
  "DATABASE_PUBLIC_URL",
  "DATABASE",
  "MYSQL_DATABASE_URL"
].map { |key| env_value.call(key) }.compact.first.to_s
mysql_url = URI.parse(raw_mysql_url) unless raw_mysql_url.empty?
url_value = ->(value) do
  value = value.to_s.strip
  value unless value.empty?
end
mysql_credentials = begin
  Rails.application.credentials.dig(:database, :production) || {}
rescue StandardError
  {}
end

production_mysql_database = env_value.call("MYSQLDATABASE") || env_value.call("DB_NAME") || url_value.call(mysql_url&.path&.delete_prefix("/")) || "legsim"
production_mysql_username = env_value.call("MYSQLUSER") || env_value.call("DB_USERNAME") || env_value.call("MYSQL_USER") || url_value.call(mysql_url&.user) || ("root" if url_value.call(mysql_url&.password)) || mysql_credentials[:username]
production_mysql_host = env_value.call("MYSQLHOST") || env_value.call("DB_HOST") || url_value.call(mysql_url&.host) || mysql_credentials[:host]
production_mysql_port = env_value.call("MYSQLPORT") || env_value.call("DB_PORT") || mysql_url&.port || 3306
production_mysql_password = env_value.call("MYSQLPASSWORD") || env_value.call("DB_PASSWORD") || env_value.call("MYSQL_PASSWORD") || env_value.call("MYSQL_ROOT_PASSWORD") || url_value.call(mysql_url&.password) || mysql_credentials[:password]

if ENV["RAILS_ENV"] == "production" && ENV["SECRET_KEY_BASE_DUMMY"].to_s.empty?
  raise "MYSQLHOST or a MySQL connection URL is required in production" if production_mysql_host.to_s.empty?
  raise "MYSQLUSER or a MySQL connection URL with a username is required in production" if production_mysql_username.to_s.empty?
end
%>
default: &default
  adapter: mysql2
  encoding: utf8mb4
  username: tester
  password: Impervious7!
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 50000

development:
  <<: *default
  username: tester
  database: legsim
  password: Impervious7!
  #socket: /tmp/mysql.sock
  # adapter: mysql2
  # database: legsim
  # username: foo
  # password:

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: legsim_test

production:
  <<: *default
  database: <%= production_mysql_database.to_s.inspect %>
  username: <%= production_mysql_username.to_s.inspect %>
  host: <%= production_mysql_host.to_s.inspect %>
  port: <%= production_mysql_port %>
  reconnect: true
  password: <%= production_mysql_password.to_s.inspect %>
  read_timeout: 5000
