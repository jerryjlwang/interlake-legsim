# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem 'sqlite3'
#
<%
require "uri"

env_value = ->(key) do
  value = ENV[key].to_s
  value unless value.empty?
end

raw_mysql_url = env_value.call("MYSQL_URL").to_s
mysql_url = URI.parse(raw_mysql_url) unless raw_mysql_url.empty?
mysql_credentials = begin
  Rails.application.credentials.dig(:database, :production) || {}
rescue StandardError
  {}
end

production_mysql_database = env_value.call("MYSQLDATABASE") || env_value.call("DB_NAME") || mysql_url&.path&.delete_prefix("/") || "legsim"
production_mysql_username = env_value.call("MYSQLUSER") || env_value.call("DB_USERNAME") || mysql_url&.user || mysql_credentials[:username]
production_mysql_host = env_value.call("MYSQLHOST") || env_value.call("DB_HOST") || mysql_url&.host || mysql_credentials[:host]
production_mysql_port = env_value.call("MYSQLPORT") || env_value.call("DB_PORT") || mysql_url&.port || 3306
production_mysql_password = env_value.call("MYSQLPASSWORD") || env_value.call("DB_PASSWORD") || mysql_url&.password || mysql_credentials[:password]

if ENV["RAILS_ENV"] == "production" && ENV["SECRET_KEY_BASE_DUMMY"].to_s.empty? && production_mysql_host.to_s.empty?
  raise "MYSQLHOST or MYSQL_URL is required in production"
end
%>
default: &default
  adapter: mysql2
  encoding: utf8mb4
  username: tester
  password: Impervious7!
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 50000

development:
  <<: *default
  username: tester
  database: legsim
  password: Impervious7!
  #socket: /tmp/mysql.sock
  # adapter: mysql2
  # database: legsim
  # username: foo
  # password:

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: legsim_test

production:
  <<: *default
  database: <%= production_mysql_database.to_s.inspect %>
  username: <%= production_mysql_username.to_s.inspect %>
  host: <%= production_mysql_host.to_s.inspect %>
  port: <%= production_mysql_port %>
  reconnect: true
  password: <%= production_mysql_password.to_s.inspect %>
  read_timeout: 5000
