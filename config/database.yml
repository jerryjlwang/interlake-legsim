# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem 'sqlite3'
#
default: &default
  adapter: mysql2
  encoding: utf8mb4
  username: tester
  password: Impervious7!
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 50000

development:
  <<: *default
  username: tester
  database: legsim
  password: Impervious7!
  #socket: /tmp/mysql.sock
  # adapter: mysql2
  # database: legsim
  # username: foo
  # password:

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: legsim_test

production:
  <<: *default
  database: <%= ENV["MYSQLDATABASE"] || ENV["DB_NAME"] || "legsim" %>
  username: <%= ENV["MYSQLUSER"] || ENV["DB_USERNAME"] || Rails.application.credentials.dig(:database, :production, :username) %>
  host: <%= ENV["MYSQLHOST"] || ENV["DB_HOST"] || Rails.application.credentials.dig(:database, :production, :host) %>
  port: <%= ENV["MYSQLPORT"] || ENV["DB_PORT"] || 3306 %>
  reconnect: true
  password: <%= ENV["MYSQLPASSWORD"] || ENV["DB_PASSWORD"] || Rails.application.credentials.dig(:database, :production, :password) %>
  read_timeout: 5000
